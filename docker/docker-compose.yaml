services:
  postgres:
    image: postgres:18
    container_name: qfeed-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: qfeed
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - qfeed-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qfeed"]
      interval: 5s
      timeout: 3s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: qfeed-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - qfeed-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: qfeed-postgres-exporter
    restart: unless-stopped
    environment:
      # exporter가 같은 docker network 안에서 postgres 컨테이너를 '서비스명(postgres)'으로 접근
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/qfeed?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
        postgres:
          condition: service_healthy
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"


  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
volumes:
  qfeed-postgres-data:
  qfeed-redis-data:
