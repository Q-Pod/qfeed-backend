name: Backend CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  id-token: write
  contents: read
  actions: read

env:
  JAVA_VERSION: '25'
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: qfeed-ecr-backend
  DEPLOY_RAW_BASE_DEV: https://raw.githubusercontent.com/100-hours-a-week/17-JinyUs-Q-Feed-Cloud/main/deploy/dev/backend
  DEPLOY_RAW_BASE_PROD: https://raw.githubusercontent.com/100-hours-a-week/17-JinyUs-Q-Feed-Cloud/main/deploy/prod/backend

jobs:
  ci:
    name: CI - Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Run tests
        run: ./gradlew test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test/
          retention-days: 7

      - name: Upload JAR artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: build/libs/*.jar
          retention-days: 1

      - name: Discord 알림 (CI 통과)
        if: success()
        continue-on-error: true
        run: |
          curl -sS -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ BE CI 통과",
                "description": "빌드·테스트·아티팩트 업로드까지 완료되었습니다.",
                "color": 3066993,
                "fields": [
                  {"name": "브랜치", "value": "'"${{ github.ref_name }}"'", "inline": true},
                  {"name": "커밋", "value": "`'"${{ github.sha }}"'`", "inline": true},
                  {"name": "트리거", "value": "'"${{ github.event_name }}"'", "inline": true}
                ],
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
              }]
            }'

  deploy-dev:
    name: Deploy to Dev
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/qfeed-dev-role-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Check if image exists
        id: check
        run: |
          aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=${{ steps.meta.outputs.short_sha }} \
            > /dev/null 2>&1 && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'false'

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSM
        id: ssm-deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets '[{"Key":"tag:Name","Values":["qfeed-dev-ec2-backend"]}]' \
            --parameters '{"commands":["mkdir -p /srv/qfeed && curl -sfL ${{ env.DEPLOY_RAW_BASE_DEV }}/deploy.sh -o /srv/qfeed/deploy.sh && curl -sfL ${{ env.DEPLOY_RAW_BASE_DEV }}/docker-compose.yml -o /srv/qfeed/docker-compose.yml && cd /srv/qfeed && bash deploy.sh ${{ steps.meta.outputs.short_sha }}"],"executionTimeout":["600"]}' \
            --timeout-seconds 600 \
            --comment "Deploy backend ${{ steps.meta.outputs.short_sha }}" \
            --output text --query "Command.CommandId")
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment
        run: |
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(aws ssm list-command-invocations \
              --command-id "${{ steps.ssm-deploy.outputs.command_id }}" \
              --query "CommandInvocations[0].Status" --output text 2>/dev/null || echo "Pending")
            echo "  Status: ${STATUS} (${i}0s)"
            if [ "$STATUS" = "Success" ]; then echo "Deploy OK"; exit 0; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed: ${STATUS}"
              INSTANCE_ID=$(aws ssm list-command-invocations \
                --command-id "${{ steps.ssm-deploy.outputs.command_id }}" \
                --query "CommandInvocations[0].InstanceId" --output text)
              aws ssm get-command-invocation \
                --command-id "${{ steps.ssm-deploy.outputs.command_id }}" \
                --instance-id "$INSTANCE_ID" \
                --query "[StandardOutputContent,StandardErrorContent]" --output text || true
              exit 1
            fi
          done
          echo "Timed out"; exit 1

      - name: Discord 알림 (Dev 배포 성공)
        if: success()
        continue-on-error: true
        run: |
          curl -sS -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"✅ BE Dev 배포 완료\",\"description\":\"이미지 \`${{ steps.meta.outputs.short_sha }}\` 배포 성공\",\"color\":3066993}]}"

  # NOTE: prod 인프라 전환 완료 후 deploy-dev와 동일한 방식(OIDC+SSM)으로 교체 예정
  deploy-prod:
    name: Deploy to Prod
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/qfeed-prod-role-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Check if image exists
        id: check
        run: |
          aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=${{ steps.meta.outputs.short_sha }} \
            > /dev/null 2>&1 && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'false'

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSM
        id: ssm-deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets '[{"Key":"tag:Name","Values":["qfeed-prod-ec2-backend"]}]' \
            --parameters '{"commands":["mkdir -p /srv/qfeed && curl -sfL ${{ env.DEPLOY_RAW_BASE_PROD }}/deploy.sh -o /srv/qfeed/deploy.sh && curl -sfL ${{ env.DEPLOY_RAW_BASE_PROD }}/docker-compose.yml -o /srv/qfeed/docker-compose.yml && cd /srv/qfeed && bash deploy.sh ${{ steps.meta.outputs.short_sha }}"],"executionTimeout":["600"]}' \
            --timeout-seconds 600 \
            --comment "Deploy backend ${{ steps.meta.outputs.short_sha }}" \
            --output text --query "Command.CommandId")
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment
        run: |
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(aws ssm list-command-invocations \
              --command-id "${{ steps.ssm-deploy.outputs.command_id }}" \
              --query "CommandInvocations[0].Status" --output text 2>/dev/null || echo "Pending")
            echo "  Status: ${STATUS} (${i}0s)"
            if [ "$STATUS" = "Success" ]; then echo "Deploy OK"; exit 0; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed: ${STATUS}"
              INSTANCE_ID=$(aws ssm list-command-invocations \
                --command-id "${{ steps.ssm-deploy.outputs.command_id }}" \
                --query "CommandInvocations[0].InstanceId" --output text)
              aws ssm get-command-invocation \
                --command-id "${{ steps.ssm-deploy.outputs.command_id }}" \
                --instance-id "$INSTANCE_ID" \
                --query "[StandardOutputContent,StandardErrorContent]" --output text || true
              exit 1
            fi
          done
          echo "Timed out"; exit 1

  discord-ci-failure:
    name: Discord 알림 (CI 실패)
    runs-on: ubuntu-latest
    needs: ci
    if: always() && needs.ci.result == 'failure'
    steps:
      - name: 실패한 Step 조회
        id: failed
        run: |
          RES=$(curl -sS -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs")
          FAILED_JOB_ID=$(echo "$RES" | jq -r '.jobs[] | select(.name == "CI - Build and Test") | .id')
          if [ -n "$FAILED_JOB_ID" ]; then
            STEPS_RES=$(curl -sS -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/jobs/$FAILED_JOB_ID")
            FAILED_STEP=$(echo "$STEPS_RES" | jq -r '.steps[] | select(.conclusion == "failure") | .name' | head -1)
          fi
          [ -z "$FAILED_STEP" ] && FAILED_STEP="(확인 불가)"
          echo "step=$FAILED_STEP" >> $GITHUB_OUTPUT

      - name: Discord 알림 (CI 실패)
        continue-on-error: true
        run: |
          PAYLOAD=$(jq -n \
            --arg step "${{ steps.failed.outputs.step }}" \
            --arg ref "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              embeds: [{
                title: "❌ BE CI 실패",
                description: ("**실패한 Step:** " + $step),
                color: 15158332,
                fields: [
                  {name: "브랜치", value: $ref, inline: true},
                  {name: "커밋", value: ("`" + $sha + "`"), inline: true},
                  {name: "워크플로우", value: ("[Run 보기](" + $url + ")"), inline: false}
                ],
                timestamp: $ts
              }]
            }')
          curl -sS -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  discord-deploy-dev-failure:
    name: Discord 알림 (Dev 배포 실패)
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: always() && needs.deploy-dev.result == 'failure'
    steps:
      - name: Discord 알림 (Dev 배포 실패)
        continue-on-error: true
        run: |
          curl -sS -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ BE Dev 배포 실패\",\"color\":15158332,\"fields\":[{\"name\":\"브랜치\",\"value\":\"${{ github.ref_name }}\",\"inline\":true},{\"name\":\"커밋\",\"value\":\"\`${{ github.sha }}\`\",\"inline\":true},{\"name\":\"워크플로우\",\"value\":\"[Run 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}]}]}"

  discord-deploy-prod-failure:
    name: Discord 알림 (Prod 배포 실패)
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: always() && needs.deploy-prod.result == 'failure'
    steps:
      - name: Discord 알림 (Prod 배포 실패)
        continue-on-error: true
        run: |
          curl -sS -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ BE Prod 배포 실패\",\"color\":15158332,\"fields\":[{\"name\":\"브랜치\",\"value\":\"${{ github.ref_name }}\",\"inline\":true},{\"name\":\"커밋\",\"value\":\"\`${{ github.sha }}\`\",\"inline\":true},{\"name\":\"워크플로우\",\"value\":\"[Run 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}]}]}"
