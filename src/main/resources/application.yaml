spring:
  application:
    name: QFeed
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  security:
    is-authenticated: true
    permit-all-endpoints:
      - "/"
      - "/error"
      - "/actuator/health"
      - "/actuator/prometheus"
      - "/actuator/info"
      - "/api/auth/tokens"
    anonymous-only-endpoints:
      - "/api/auth/oauth/authorization-url"
      - "/api/auth/oauth/{provider}/callback"
      - "/api/auth/oauth/exchange"
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao
            scope:
              - profile_nickname
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  cloud:
    aws:
      region:
        static: ${AWS_REGION}
      parameterstore:
        enabled: ${AWS_PARAMETER_STORE_ENABLED:true}
  config:
    import: optional:aws-parameterstore:/qfeed/${DEPLOY_ENV:dev}/be/

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_batch_fetch_size: 100
    open-in-view: false

oauth:
  frontend-redirect-uri: ${OAUTH2_FRONTEND_REDIRECT_URI}

cookie:
  secure: true

cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGIN}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 600000  # 10분 (ms)
  refresh-token-expiration: 1209600000  # 14일 (ms)

aws:
  region: ${AWS_REGION}
  s3:
    upload-bucket-name: ${AWS_S3_UPLOAD_BUCKET_NAME}
    tts-bucket-name: ${AWS_S3_TTS_BUCKET_NAME}
    cdn-url-prefix: ${AWS_S3_CDN_URL_PREFIX}

ai:
  feedback:
    base-url: ${AI_FEEDBACK_BASE_URL}
    endpoint: /ai/interview/feedback/request
    follow-up-endpoint: /ai/interview/follow-up/questions
    timeout: 60000  # 60초
  stt:
    base-url: ${AI_STT_BASE_URL}
    endpoint: /ai/stt
    timeout: 60000  # 60초
  tts:
    base-url: ${AI_TTS_BASE_URL:${AI_STT_BASE_URL:http://localhost:8000}}
    endpoint: /ai/tts
    timeout: 60000  # 60초

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health, metrics, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: QFeed
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms, 200ms, 500ms, 1s, 2s, 3s
  prometheus:
    metrics:
      export:
        enabled: true
        step: 10s

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

abuse:
  guard:
    # Rate Limit
    user-per-minute: ${ABUSE_GUARD_USER_PER_MINUTE:3}
    user-per-hour: ${ABUSE_GUARD_USER_PER_HOUR:30}
    ip-per-minute: ${ABUSE_GUARD_IP_PER_MINUTE:15}
    question-cooldown-seconds: ${ABUSE_GUARD_QUESTION_COOLDOWN_SECONDS:60}
    question-consecutive-limit: ${ABUSE_GUARD_QUESTION_CONSECUTIVE_LIMIT:3}

    # Content Quality
    max-whitespace-ratio: ${ABUSE_GUARD_MAX_WHITESPACE_RATIO:0.4}
    max-repeat-char-count: ${ABUSE_GUARD_MAX_REPEAT_CHAR_COUNT:5}
    min-korean-english-ratio: ${ABUSE_GUARD_MIN_KOREAN_ENGLISH_RATIO:0.5}

    # Duplicate
    similarity-threshold: ${ABUSE_GUARD_SIMILARITY_THRESHOLD:0.9}

    # Quality Score
    min-score-for-feedback: ${ABUSE_GUARD_MIN_SCORE_FOR_FEEDBACK:60}
    min-score-for-accept: ${ABUSE_GUARD_MIN_SCORE_FOR_ACCEPT:30}

    # Quota
    daily-quota-limit: ${ABUSE_GUARD_DAILY_QUOTA_LIMIT:15}
    soft-quota-limit: ${ABUSE_GUARD_SOFT_QUOTA_LIMIT:10}

    # Guard 활성화 설정
    rate-limit:
      enabled: ${ABUSE_GUARD_RATE_LIMIT_ENABLED:true}
    content-quality:
      enabled: ${ABUSE_GUARD_CONTENT_QUALITY_ENABLED:true}
    duplicate:
      enabled: ${ABUSE_GUARD_DUPLICATE_ENABLED:true}
    quality-score:
      enabled: ${ABUSE_GUARD_QUALITY_SCORE_ENABLED:true}
    quota:
      enabled: ${ABUSE_GUARD_QUOTA_ENABLED:true}

interview:
  session:
    practice-ttl: PT10M
    real-ttl: PT90M
    real-max-turn: ${INTERVIEW_SESSION_REAL_MAX_TURN}
    cleanup-interval-ms: 300000
    store:
      history-key-prefix: interview:session
      feedback-key-prefix: interview:feedback

file:
  multipart:
    cleanup-interval-ms: 600000
